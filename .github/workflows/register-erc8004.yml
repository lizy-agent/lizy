name: Register LIZY on ERC-8004

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (simulate only, no transaction sent)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  register:
    name: Mint ERC-8004 Agent NFT on Abstract Mainnet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Check wallet balance
        run: |
          ADDR=$(cast wallet address --private-key "$PRIVATE_KEY")
          echo "Registrar wallet: $ADDR"
          BALANCE=$(cast balance "$ADDR" --rpc-url "$RPC_URL" --ether)
          echo "ETH balance: $BALANCE"
        env:
          PRIVATE_KEY: ${{ secrets.REGISTRAR_PRIVATE_KEY }}
          RPC_URL: https://api.mainnet.abs.xyz

      - name: Check if already registered
        id: check
        run: |
          ADDR=$(cast wallet address --private-key "$PRIVATE_KEY")
          COUNT=$(cast call "$REGISTRY" "balanceOf(address)(uint256)" "$ADDR" --rpc-url "$RPC_URL")
          echo "Existing registrations for $ADDR: $COUNT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
        env:
          PRIVATE_KEY: ${{ secrets.REGISTRAR_PRIVATE_KEY }}
          RPC_URL: https://api.mainnet.abs.xyz
          REGISTRY: '0x8004A169FB4a3325136EB29fA0ceB6D2e539a432'

      - name: Register agent (dry run)
        if: inputs.dry_run == 'true'
        run: |
          echo "DRY RUN — would call:"
          echo "  cast send $REGISTRY 'register(string)(uint256)' '$AGENT_URI' --rpc-url $RPC_URL"
          echo "  Agent URI: $AGENT_URI"
        env:
          REGISTRY: '0x8004A169FB4a3325136EB29fA0ceB6D2e539a432'
          AGENT_URI: 'https://mcp.lizy.world/.well-known/agent-registration.json'
          RPC_URL: https://api.mainnet.abs.xyz

      - name: Register agent on-chain
        if: inputs.dry_run == 'false'
        id: register
        run: |
          echo "Sending registration transaction..."
          TX=$(cast send "$REGISTRY" \
            "register(string)(uint256)" \
            "$AGENT_URI" \
            --rpc-url "$RPC_URL" \
            --private-key "$PRIVATE_KEY" \
            --json)
          TX_HASH=$(echo "$TX" | jq -r '.transactionHash')
          echo "Transaction hash: $TX_HASH"
          echo "tx_hash=$TX_HASH" >> "$GITHUB_OUTPUT"

          echo "Waiting for receipt..."
          RECEIPT=$(cast receipt "$TX_HASH" --rpc-url "$RPC_URL" --json)
          STATUS=$(echo "$RECEIPT" | jq -r '.status')
          echo "Status: $STATUS"

          if [ "$STATUS" != "0x1" ]; then
            echo "Transaction failed!"
            exit 1
          fi

          # Extract agentId from Transfer event (token minted = agentId)
          AGENT_ID=$(echo "$RECEIPT" | jq -r '.logs[0].topics[3] // empty' | xargs -I{} cast to-dec {})
          echo "Agent ID: $AGENT_ID"
          echo "agent_id=$AGENT_ID" >> "$GITHUB_OUTPUT"
        env:
          PRIVATE_KEY: ${{ secrets.REGISTRAR_PRIVATE_KEY }}
          RPC_URL: https://api.mainnet.abs.xyz
          REGISTRY: '0x8004A169FB4a3325136EB29fA0ceB6D2e539a432'
          AGENT_URI: 'https://mcp.lizy.world/.well-known/agent-registration.json'

      - name: Print summary
        if: inputs.dry_run == 'false'
        run: |
          echo "## ERC-8004 Registration Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Agent ID | \`${{ steps.register.outputs.agent_id }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tx Hash | \`${{ steps.register.outputs.tx_hash }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry | \`0x8004A169FB4a3325136EB29fA0ceB6D2e539a432\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Chain | Abstract Mainnet (2741) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Agent URI | https://mcp.lizy.world/.well-known/agent-registration.json |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "View on 8004scan: https://8004scan.io/agents/abstract/${{ steps.register.outputs.agent_id }}" >> "$GITHUB_STEP_SUMMARY"
