name: CI

on:
  push:
    branches: [main, 'claude/*']
  pull_request:
    branches: [main]

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build types package
        run: pnpm --filter @lizy/types build

      - name: Type check all packages
        run: pnpm type-check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build types package
        run: pnpm --filter @lizy/types build

      - name: Lint
        run: pnpm lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [type-check]
    env:
      ABSTRACT_RPC: https://api.mainnet.abs.xyz
      ABSTRACT_RPC_FALLBACK: https://rpc.abs.xyz
      ETHEREUM_RPC: https://eth.llamarpc.com
      ETHEREUM_RPC_FALLBACK: https://cloudflare-eth.com/v1/mainnet
      X402_FACILITATOR: https://facilitator.x402.abs.xyz
      MPP_ENDPOINT: https://mpp.abs.xyz
      USDC_E_ADDRESS: '0xbd28Bd5A3Ef540d1582828CE2A1a657353008C61'
      IDENTITY_REGISTRY: '0x8004A169FB4a3325136EB29fA0ceB6D2e539a432'
      REPUTATION_REGISTRY: '0x8004BAa17C55a88189AE136b182e5fdA19dE9b63'
      PUDGY_PENGUINS: '0xBd3531dA5CF5857e7CfAA92426877b022e612cf8'
      PENGU_TOKEN: '0x9E18B8AF9Fe1Be6Cc9F4E5cE69cDe54F8aECe95'
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-key-for-ci-only-not-real' }}
      UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL || 'https://placeholder.upstash.io' }}
      UPSTASH_REDIS_TOKEN: ${{ secrets.UPSTASH_REDIS_TOKEN || 'placeholder-token-for-ci' }}
      SERVER_SECRET: 'ci-server-secret-32chars-minimum-ok'
      ADMIN_SECRET: 'ci-admin-secret-ok'
      NEXT_PUBLIC_ABSTRACT_RPC: https://api.mainnet.abs.xyz
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      NEXT_PUBLIC_SITE_URL: https://lizy.world
      NEXT_PUBLIC_MCP_SERVER_URL: https://mcp.lizy.world

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
