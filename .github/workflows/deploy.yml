name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-mcp-server:
    name: Deploy MCP Server to Railway
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway Deploy Hook
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK }}")
          echo "Response: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "Deploy hook failed with status $RESPONSE"
            exit 1
          fi
          echo "Railway deployment triggered successfully"

  deploy-web:
    name: Deploy Web to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy Web
        run: vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
