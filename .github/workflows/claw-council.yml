name: Claw Council Verification

on:
  workflow_dispatch:

jobs:
  verify:
    name: Swap PENGU - Join Claw Council
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies for AGW setup
        run: npm install viem @abstract-foundation/agw-client

      - name: Setup AGW (deploy if not deployed + show address)
        env:
          REGISTRAR_PRIVATE_KEY: ${{ secrets.REGISTRAR_PRIVATE_KEY }}
        run: node scripts/setup-agw.mjs

      - name: Clone Claw Council skill
        run: git clone https://github.com/saucailli/claw-council.git

      - name: Install Claw Council dependencies
        run: cd claw-council && npm install

      - name: Check AGW readiness
        env:
          RAW_PK: ${{ secrets.REGISTRAR_PRIVATE_KEY }}
        run: |
          KEY="${RAW_PK// /}"
          KEY="${KEY#0x}"
          cd claw-council && AGENT_PRIVATE_KEY="0x${KEY}" node examples/check_readiness.js

      - name: Run PENGU swap verification
        env:
          RAW_PK: ${{ secrets.REGISTRAR_PRIVATE_KEY }}
        run: |
          KEY="${RAW_PK// /}"
          KEY="${KEY#0x}"
          cd claw-council && AGENT_PRIVATE_KEY="0x${KEY}" node examples/swap_pengu_verification.js
