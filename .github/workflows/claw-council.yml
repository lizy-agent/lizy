name: Claw Council Verification

on:
  workflow_dispatch:

jobs:
  verify:
    name: Swap PENGU - Join Claw Council
    runs-on: ubuntu-latest
    steps:
      - name: Clone Claw Council skill
        run: git clone https://github.com/saucailli/claw-council.git

      - name: Install dependencies
        run: cd claw-council && npm install

      - name: Normalize private key and check AGW readiness
        env:
          RAW_PK: ${{ secrets.REGISTRAR_PRIVATE_KEY }}
        run: |
          KEY="${RAW_PK// /}"
          KEY="${KEY#0x}"
          export AGENT_PRIVATE_KEY="0x${KEY}"
          echo "Key length: ${#AGENT_PRIVATE_KEY} chars"
          cd claw-council && AGENT_PRIVATE_KEY="0x${KEY}" node examples/check_readiness.js

      - name: Run PENGU swap verification
        env:
          RAW_PK: ${{ secrets.REGISTRAR_PRIVATE_KEY }}
        run: |
          KEY="${RAW_PK// /}"
          KEY="${KEY#0x}"
          cd claw-council && AGENT_PRIVATE_KEY="0x${KEY}" node examples/swap_pengu_verification.js
